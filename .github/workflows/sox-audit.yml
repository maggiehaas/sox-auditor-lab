name: SOX AI Auditor
on:
  pull_request:
    branches: [ "main" ]

# This section explicitly tells GitHub "I am allowed to see the code"
permissions:
  contents: read
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      # We use a simpler version of checkout that doesn't try to be "fancy"
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Get Code Changes
        run: |
          # Instead of fancy Git commands, let's just prove we can see the files
          ls -R
          echo "I can see the files! Setup successful." > success.txt

      - name: Post Success Comment
        uses: mshick/add-pr-comment@v2
        with:
          message: |
            ### 🛡️ SOX Audit Result
            **Status:** ✅ THE DOOR IS OPEN! 
            **Findings:** The workflow successfully accessed the private repository.
