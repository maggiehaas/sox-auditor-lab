name: SOX AI Auditor
on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          # We removed the 'cache' line that caused the error!

      - name: Install Google AI
        run: |
          python -m pip install --upgrade pip
          python -m pip install google-generativeai

      - name: Run AI Audit
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python - <<EOF
          import os
          import subprocess
          import sys
          import google.generativeai as genai

          print("--- Starting AI Audit ---")

          try:
              # 1. Setup AI
              genai.configure(api_key=os.environ["GEMINI_API_KEY"])
              model = genai.GenerativeModel('gemini-2.0-flash')

              # 2. Get the Diff
              # We use the SHAs to be 100% safe
              base_sha = "${{ github.event.pull_request.base.sha }}"
              head_sha = "${{ github.event.pull_request.head.sha }}"
              diff = subprocess.check_output(['git', 'diff', base_sha, head_sha], text=True)
              
              if not diff:
                  diff = "No code changes detected (maybe only file renames)."

              # 3. The Auditor Prompt
              prompt = f"Identify if these code changes are Functional or Non-Functional for SOX compliance. Summarize in 2 sentences:\n\n{diff}"

              # 4. Generate and Save
              print("Communicating with Gemini...")
              response = model.generate_content(prompt)
              
              with open("ai_report.txt", "w") as f:
                  f.write(f"### 🛡️ SOX Audit Result\n\n{response.text}")
              print("✅ Audit complete!")

          except Exception as e:
              with open("ai_report.txt", "w") as f:
                  f.write(f"### ❌ Audit Failed\n\nError: {str(e)}")
              print(f"❌ Error: {e}")
          EOF

      - name: Post Comment
        uses: mshick/add-pr-comment@v2
        with:
          message-path: ai_report.txt
