name: SOX AI Auditor
on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Google AI
        run: |
          python -m pip install --upgrade pip
          python -m pip install google-generativeai

      - name: Run AI Audit
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python - <<EOF
          import os
          import subprocess
          import time
          import google.generativeai as genai

          # 1. Setup
          genai.configure(api_key=os.environ["GEMINI_API_KEY"])
          # Using 1.5-flash as it's often more stable for free-tier quotas
          model = genai.GenerativeModel('gemini-1.5-flash')

          def get_audit():
              try:
                  # Capture the changes
                  diff = subprocess.check_output(['git', 'diff', 'origin/main...HEAD'], text=True)
                  if not diff.strip():
                      return "No logic changes detected in this Pull Request."

                  prompt = f"Analyze these changes for SOX compliance. Is it 'Functional' or 'Non-Functional'? Summarize the financial risk in 2 sentences:\n\n{diff}"
                  
                  # 2. RESILIENT RETRY LOOP
                  for attempt in range(3):
                      try:
                          print(f"Attempting AI Analysis (Try {attempt + 1})...")
                          response = model.generate_content(prompt)
                          return response.text
                      except Exception as e:
                          if "429" in str(e) and attempt < 2:
                              print("⚠️ Rate limit hit. Cooling down for 65 seconds...")
                              time.sleep(65) 
                          else:
                              raise e
              except Exception as e:
                  return f"⚠️ **Audit could not be completed.**\n\nError: {str(e)}"

          # 3. Save and Exit
          report = get_audit()
          with open("ai_report.txt", "w") as f:
              f.write(f"### 🛡️ SOX Audit Result\n\n{report}")
          EOF

      - name: Post Comment
        uses: mshick/add-pr-comment@v2
        with:
          message-path: ai_report.txt
