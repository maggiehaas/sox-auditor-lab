name: SOX AI Auditor
on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run AI Audit
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        shell: python
        run: |
            import os
            import subprocess
            import sys

            # 1. Force install the library INSIDE the script
            subprocess.check_call([sys.executable, "-m", "pip", "install", "google-generativeai"])
            
            import google.generativeai as genai

            # 2. Setup AI
            genai.configure(api_key=os.environ["GEMINI_API_KEY"])
            model = genai.GenerativeModel('gemini-1.5-flash')

            # 3. Get the Diff
            # We run a system command to get the changes
            diff_proc = subprocess.run(['git', 'diff', 'origin/main...HEAD'], capture_output=True, text=True)
            diff_content = diff_proc.stdout if diff_proc.stdout else "No logic changes detected."

            # 4. The Prompt
            prompt = f"Identify if these code changes are Functional or Non-Functional for SOX compliance:\n\n{diff_content}"

            # 5. Generate and Save
            response = model.generate_content(prompt)
            with open("ai_report.txt", "w") as f:
                f.write(f"### 🛡️ SOX Audit Result\n\n{response.text}")

      - name: Post AI Comment
        uses: mshick/add-pr-comment@v2
        with:
          message-path: ai_report.txt
