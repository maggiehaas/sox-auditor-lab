name: SOX AI Auditor
on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Code Changes
        id: diff
        run: |
          git diff origin/main...HEAD > changes.diff
          # Save the diff to an environment variable so Python can read it
          echo "PR_DIFF<<EOF" >> $GITHUB_ENV
          cat changes.diff >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: AI Analysis
        id: ai
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        shell: python
        run: |
            import os
            import google.generativeai as genai

            # 1. Setup the AI
            genai.configure(api_key=os.environ["GEMINI_API_KEY"])
            model = genai.GenerativeModel('gemini-1.5-flash')

            # 2. Prepare the Auditor Prompt
            diff_content = os.environ["PR_DIFF"]
            prompt = f"""
            You are a SOX Compliance Auditor. Analyze this code change:
            
            {diff_content}

            1. Is this 'Functional' (logic/math/security) or 'Non-Functional' (comments/formatting)?
            2. What is the risk level (Low/Medium/High) for financial reporting?
            3. Provide a 2-sentence summary for a human reviewer.
            
            Format your response in Markdown with a '🛡️ SOX Audit' header.
            """

            # 3. Get the result
            response = model.generate_content(prompt)
            
            # 4. Save result for the next step
            with open("ai_report.txt", "w") as f:
                f.write(response.text)

      - name: Post AI Comment
        uses: mshick/add-pr-comment@v2
        with:
          message-path: ai_report.txt
