name: SOX AI Auditor
on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # We are explicitly naming YOUR repo and YOUR token
          repository: ${{ github.repository }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Debug Connection
        run: |
          echo "Current Repository: ${{ github.repository }}"
          git remote -v
          ls -R

      - name: Post Success Comment
        uses: mshick/add-pr-comment@v2
        with:
          message: |
            ### 🛡️ SOX Audit Result
            **Status:** ✅ CONNECTION ESTABLISHED
            **Findings:** The workflow has successfully bypassed the 'Not Found' error.
