name: SOX AI Auditor
on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install and Run AI Audit
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # 1. Install the library
          python -m pip install --upgrade pip
          python -m pip install google-generativeai
          
          # 2. Run the actual Audit Script
          python - <<EOF
          import os
          import subprocess
          import google.generativeai as genai

          print("--- Starting AI Analysis ---")

          try:
              # Setup AI
              genai.configure(api_key=os.environ["GEMINI_API_KEY"])
              model = genai.GenerativeModel('gemini-1.5-flash')

              # Get the Diff
              diff_proc = subprocess.run(['git', 'diff', 'origin/main...HEAD'], capture_output=True, text=True)
              diff_content = diff_proc.stdout if diff_proc.stdout else "No logic changes detected."

              # The Prompt
              prompt = f"Identify if these code changes are Functional or Non-Functional for SOX compliance. Summarize in 2 sentences:\n\n{diff_content}"

              # Generate
              print("Sending request to Gemini...")
              response = model.generate_content(prompt)
              
              with open("ai_report.txt", "w") as f:
                  f.write(f"### 🛡️ SOX Audit Result\n\n{response.text}")
              print("Success: Report generated.")

          except Exception as e:
              with open("ai_report.txt", "w") as f:
                  f.write(f"### ❌ Audit Failed\n\nError: {str(e)}")
              print(f"Error occurred: {e}")
          EOF

      - name: Post Comment
        uses: mshick/add-pr-comment@v2
        with:
          message-path: ai_report.txt
