- name: Run AI Audit
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python - <<EOF
          import os
          import subprocess
          import time
          import google.generativeai as genai

          # Setup
          genai.configure(api_key=os.environ["GEMINI_API_KEY"])
          model = genai.GenerativeModel('gemini-2.0-flash')

          def run_audit():
              base_sha = "${{ github.event.pull_request.base.sha }}"
              head_sha = "${{ github.event.pull_request.head.sha }}"
              diff = subprocess.check_output(['git', 'diff', base_sha, head_sha], text=True)
              prompt = f"Analyze these changes for SOX compliance. Is it Functional or Non-Functional? Summarize in 2 sentences:\n\n{diff}"
              
              # Retry logic for 429 errors
              for i in range(3):
                  try:
                      return model.generate_content(prompt).text
                  except Exception as e:
                      if "429" in str(e) and i < 2:
                          print(f"Rate limit hit. Retrying in 30s...")
                          time.sleep(30)
                      else:
                          return f"⚠️ **AI Audit Delayed:** The AI is currently at capacity. Please re-run this check in a few minutes.\n\n*Error Detail: {str(e)}*"

          result = run_audit()
          with open("ai_report.txt", "w") as f:
              f.write(f"### 🛡️ SOX Audit Result\n\n{result}")
          EOF

      - name: Post Comment
        uses: mshick/add-pr-comment@v2
        with:
          message-path: ai_report.txt
