name: SOX AI Auditor
on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run AI Audit
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        shell: python
        run: |
            import os
            import subprocess
            import sys

            # 1. THE FORCE-FEED: Install the library directly into the current process
            print("Installing Google AI library...")
            subprocess.check_call([sys.executable, "-m", "pip", "install", "google-generativeai"])
            
            # 2. NOW we can import it
            import google.generativeai as genai
            print("✅ Library successfully imported!")

            try:
                # 3. Setup AI
                genai.configure(api_key=os.environ["GEMINI_API_KEY"])
                model = genai.GenerativeModel('gemini-1.5-flash')

                # 4. Get the Diff
                diff_proc = subprocess.run(['git', 'diff', 'origin/main...HEAD'], capture_output=True, text=True)
                diff_content = diff_proc.stdout if diff_proc.stdout else "No logic changes detected."

                # 5. The Prompt
                prompt = f"Identify if these code changes are Functional or Non-Functional for SOX compliance:\n\n{diff_content}"

                # 6. Generate and Save
                response = model.generate_content(prompt)
                with open("ai_report.txt", "w") as f:
                    f.write(f"### 🛡️ SOX Audit Result\n\n{response.text}")
                print("✅ Audit complete!")

            except Exception as e:
                with open("ai_report.txt", "w") as f:
                    f.write(f"### ❌ API Error\n\nCheck if your GEMINI_API_KEY is correct. Error: {str(e)}")
                print(f"❌ Error: {e}")

      - name: Post AI Comment
        uses: mshick/add-pr-comment@v2
        with:
          message-path: ai_report.txt
