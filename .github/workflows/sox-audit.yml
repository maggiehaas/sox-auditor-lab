name: SOX AI Auditor
on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # This allows you to run it manually!

permissions:
  contents: read
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # This helps keep the environment stable

      - name: Install Google AI
        run: |
          python -m pip install --upgrade pip
          python -m pip install google-generativeai
          # This line tells us exactly where it was installed
          echo "PYTHONPATH=$(python -c 'import site; print(site.getsitepackages()[0])')" >> $GITHUB_ENV

      - name: Run AI Audit
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python - <<EOF
          import os
          import subprocess
          import sys
          
          # Force the script to see the installed library
          try:
              import google.generativeai as genai
              print("✅ SUCCESS: Library found!")
          except ImportError:
              print("❌ STILL MISSING: Re-installing inside script...")
              subprocess.check_call([sys.executable, "-m", "pip", "install", "google-generativeai"])
              import google.generativeai as genai

          # Setup AI
          genai.configure(api_key=os.environ["GEMINI_API_KEY"])
          model = genai.GenerativeModel('gemini-1.5-flash')

          # Get Diff
          diff = subprocess.check_output(['git', 'diff', 'origin/main...HEAD'], text=True)
          
          # Audit
          prompt = f"Identify if these changes are Functional or Non-Functional for SOX:\n\n{diff}"
          response = model.generate_content(prompt)
          
          with open("ai_report.txt", "w") as f:
              f.write(f"### 🛡️ SOX Audit Result\n\n{response.text}")
          EOF

      - name: Post Comment
        uses: mshick/add-pr-comment@v2
        with:
          message-path: ai_report.txt
