name: SOX AI Auditor
on:
  pull_request:
    branches: [ "main" ]

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Downloads all history

      - name: Get Code Changes
        run: |
          # We use the specific Commit IDs provided by the PR event itself
          git diff ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} > changes.diff
          echo "Diff captured successfully."

      - name: Post Mock Result
        uses: mshick/add-pr-comment@v2
        with:
          message: |
            ### 🛡️ SOX Audit Result
            **Status:** ✅ Workflow Running Perfectly
            **Findings:** I can now see your code changes. Ready for the real AI!
